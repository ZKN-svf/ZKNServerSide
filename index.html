<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Para Emilly</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  
  body { 
    height: 100vh; 
    background: #f3efe5; 
    display: flex; 
    align-items: center; 
    justify-content: center; 
    font-family: 'Inter', -apple-system, sans-serif; 
    overflow: hidden; 
    position: fixed; 
    width: 100%; 
  }

  .container { 
    position: relative; 
    width: 100%; 
    max-width: 350px; 
    height: 100vh; 
    display: flex; 
    align-items: center; 
    justify-content: center; 
  }

  .envelope-wrapper { 
    position: relative; 
    width: 280px; 
    height: 180px; 
    background: #ffffff; 
    box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
    cursor: pointer; 
    z-index: 50; 
    transition: transform 0.7s ease-in-out; 
  }
  
  .envelope-wrapper.open { transform: translateY(150px); }
  
  .envelope-wrapper::before { 
    content: ""; 
    position: absolute; 
    top: 0; 
    z-index: 55; 
    border-top: 90px solid #f9f6f0; 
    border-left: 140px solid transparent; 
    border-right: 140px solid transparent; 
    transform-origin: top; 
    transition: transform 0.5s ease; 
  }
  
  .envelope-wrapper.open::before { transform: rotateX(180deg); z-index: 0; }
  
  .envelope-wrapper::after { 
    content: ""; 
    position: absolute; 
    top: 0; 
    width: 0; 
    height: 0; 
    border-top: 90px solid transparent; 
    border-left: 140px solid #ffffff; 
    border-right: 140px solid #ffffff; 
    border-bottom: 90px solid #ffffff; 
    z-index: 54; 
  }

  .card { 
    position: absolute; 
    width: 260px; 
    max-height: 65vh; 
    background: #ffffff; 
    border-radius: 12px; 
    padding: 1.8rem 1.2rem; 
    box-shadow: 0 5px 25px rgba(0,0,0,0.1); 
    z-index: 10; 
    opacity: 0; 
    transition: all 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
    overflow-y: auto; 
    visibility: hidden; 
    pointer-events: none; 
    text-align: center;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .envelope-wrapper.open + .card { 
    opacity: 1; 
    visibility: visible; 
    transform: translateY(-160px); 
    z-index: 60; 
    pointer-events: all; 
  }

  .frase-unica {
    font-size: 2.2rem;
    font-weight: 900;
    color: #b87c4f;
    text-transform: uppercase;
    letter-spacing: 2px;
    text-shadow: 2px 2px 0 #f0e5da;
  }

  .hint { position: absolute; bottom: -35px; width: 100%; text-align: center; font-size: 0.7rem; color: #a57c5c; text-transform: uppercase; letter-spacing: 1px; }
</style>
</head>
<body>

<audio id="musica" loop>
  <source src="https://cdn.discordapp.com/attachments/1490177260173660201/1493660953135419493/I_Love_You_So_-_Instrumental_spotdown.org.mp3?ex=69dfc7aa&is=69de762a&hm=0bce8ddbe9f002d2a253f7708d3ff53af2e2fa34d163707d0a19e0982953cc18&" type="audio/mpeg">
</audio>

<div class="container">
  <div class="envelope-wrapper" id="envelope">
    <div class="hint">Toque para abrir/fechar</div>
  </div>

  <div class="card">
    <div class="frase-unica">Morra.</div>
  </div>
</div>

<script>
  const env = document.getElementById('envelope');
  const som = document.getElementById('musica');
  let musicStarted = false;

  env.addEventListener('click', () => {
    if (!musicStarted) {
      som.play().catch(e => console.log("Erro ao iniciar áudio"));
      musicStarted = true;
    }
    
    env.classList.toggle('open');
  });
</script>

</body>
</html>
